<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversas – Search Business</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="Conversas.css">
</head>
<body>
<div class="messenger-layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="logo-text">Search Business</span>
      <a href="inicio.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i></a>
    </div>
    <div class="sidebar-search">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="searchContatos" placeholder="Pesquisar conversa...">
    </div>
    <div class="sidebar-label">Mensagens</div>
    <ul class="contatos-list" id="contatosList">
      <li class="contato-empty">Nenhuma conversa ainda.</li>
    </ul>
  </aside>

  <main class="chat-panel">
    <div class="chat-empty" id="chatEmpty">
      <div class="chat-empty-icon">💬</div>
      <h2>Suas conversas</h2>
      <p>Selecione uma conversa ao lado ou inicie uma<br>clicando em <strong>Conversar</strong> em qualquer vaga.</p>
    </div>
    <div class="chat-header" id="chatHeader" style="display:none">
      <button class="back-mobile" id="backMobile"><i class="fa-solid fa-arrow-left"></i></button>
      <div class="chat-header-avatar" id="chatHeaderAvatar">?</div>
      <div class="chat-header-info">
        <span class="chat-header-name" id="chatHeaderName">—</span>
        <span class="chat-header-sub">Online</span>
      </div>
    </div>
    <div class="chat-messages-area" id="chatMessagesArea" style="display:none"></div>
    <div class="chat-input-bar" id="chatInputBar" style="display:none">
      <input type="text" id="msgInput" placeholder="Escreva uma mensagem..." autocomplete="off">
      <button id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
    </div>
  </main>

</div>
<script type="module" src="Conversas.js"></script>
</body>
</html>
